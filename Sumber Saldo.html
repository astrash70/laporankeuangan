<!-- MAIN CONTENT -->

<div class="main-content">

<div class="page">

<div class="topbar">

<div class="breadcrumb">
<strong>Database</strong>
<span>/</span>
<span>Sumber Saldo</span>
</div>

<div class="date-box" id="tanggal"></div>

</div>

<h1>Sumber Saldo</h1>

<p>
Kelola semua tempat penyimpanan saldo yang digunakan untuk transaksi.
</p>

<div class="toolbar">

<input
type="text"
class="search"
id="searchInput"
placeholder="Cari sumber saldo..."
>

<button class="add-btn" id="openPopup">
+ Tambah Sumber
</button>

</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th width="80">No</th>
<th>Nama Sumber</th>
<th width="80">Aksi</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="footer" id="infoData">
Menampilkan 0 data
</div>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<h2>Tambah Sumber</h2>

<input
type="text"
id="namaSumber"
class="input"
placeholder="Masukkan nama sumber"
>

<button class="save-btn" id="saveBtn">
Simpan
</button>

</div>

</div>
</div>
</div>

<script>

const modal =
document.getElementById("modal");

const openPopup =
document.getElementById("openPopup");

const saveBtn =
document.getElementById("saveBtn");

const namaInput =
document.getElementById("namaSumber");

const tableBody =
document.getElementById("tableBody");

let sumberData =
JSON.parse(
localStorage.getItem("akunBankData")
|| "[]"
);

openPopup.onclick = () => {

modal.classList.add("show");

namaInput.focus();

};

function saveStorage(){

localStorage.setItem(
"akunBankData",
JSON.stringify(sumberData)
);

}

function renderTable(){

tableBody.innerHTML = "";

sumberData.forEach((item,index)=>{

tableBody.innerHTML += `

<tr>

<td>${index+1}</td>

<td>
<strong>${item.nama}</strong>
</td>

<td>

<button
class="delete-btn"
onclick="hapusData(${index})">

<i class="fa-solid fa-trash"></i>

</button>

</td>

</tr>

`;

});

document.getElementById("infoData").innerText =
`Menampilkan ${sumberData.length} data`;

}

function hapusData(index){

if(!confirm("Hapus sumber saldo?"))
return;

sumberData.splice(index,1);

saveStorage();

renderTable();

}

saveBtn.onclick = ()=>{

const nama =
namaInput.value.trim();

if(!nama) return;

sumberData.push({
nama:nama
});

saveStorage();

renderTable();

namaInput.value="";

modal.classList.remove("show");

};

document
.getElementById("searchInput")
.addEventListener("input",(e)=>{

const keyword =
e.target.value.toLowerCase();

const rows =
tableBody.querySelectorAll("tr");

rows.forEach(row=>{

row.style.display =
row.innerText.toLowerCase().includes(keyword)
? ""
: "none";

});

});

document
.getElementById("tanggal")
.innerText =
new Date().toLocaleDateString(
"id-ID",
{
day:"numeric",
month:"long",
year:"numeric"
}
);

renderTable();

window.addEventListener("beforeunload", saveStorage);

document.addEventListener("visibilitychange", () => {

if(document.visibilityState === "hidden"){

saveStorage();

}

});

</script>
